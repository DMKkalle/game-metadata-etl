regex_map:
  - pattern: "(?i)^snes(\\b|[^a-z])|super\\s*nintendo"
    code: SNES
  - pattern: "(?i)^sfc(\\b|[^a-z])|super\\s*famicom|\\bshvc\\b"
    code: SFC
  - pattern: "(?i)famicom|family\\s*computer"
    code: FAMICOM
  - pattern: "(?i)nes(\\b|[^a-z])|nintendo\\s*entertainment\\s*system"
    code: NES
  - pattern: "(?i)game\\s*boy|\\bgb\\b"
    code: GB
  - pattern: "(?i)neo\\s*geo\\s*mvs"
    code: NEO-MVS
  - pattern: "(?i)neo\\s*geo(\\s*aes)?"
    code: NEO-AES
  - pattern: "(?i)mega\\s*drive"
    code: MD
  - pattern: "(?i)genesis"
    code: GEN
  - pattern: "(?i)^n64|nintendo\\s*64"
    code: N64
  - pattern: "(?i)sega\\s*saturn"
    code: SAT
  - pattern: "(?i)dreamcast"
    code: DC
  - pattern: "(?i)game\\s*gear"
    code: GG
  - pattern: "(?i)master\\s*system|mark\\s*iii"
    code: SMS
  - pattern: "(?i)(mega\\s*drive(?!\\s*32))"
    code: MD
  - pattern: "(?i)genesis(?!\\s*32)"
    code: GEN
  - pattern: "(?i)32x"
    code: 32X
  - pattern: "(?i)(sega\\s*cd|mega[-\\s]*cd|mega-cd|sega/mega\\s*cd)"
    code: SCD

  - pattern: "(?i)playstation\\s*5|\\bps5\\b"
    code: PS5
  - pattern: "(?i)playstation\\s*4|\\bps4\\b"
    code: PS4
  - pattern: "(?i)playstation\\s*3|\\bps3\\b"
    code: PS3
  - pattern: "(?i)playstation\\s*2|\\bps2\\b"
    code: PS2
  - pattern: "(?i)playstation(?!\\s*[2345])|\\bpsx\\b|ps\\s*one"
    code: PS
  - pattern: "(?i)playstation\\s*portable|\\bpsp\\b"
    code: PSP
  - pattern: "(?i)ps\\s*vita|playstation\\s*vita|\\bpsv\\b"
    code: PSV

  - pattern: "(?i)xbox\\s*series|series\\s*(x|s)"
    code: XSX
  - pattern: "(?i)xbox\\s*one"
    code: XONE
  - pattern: "(?i)xbox\\s*360|\\bx360\\b"
    code: X360
  - pattern: "(?i)\\bxbox\\b"
    code: XBOX

  - pattern: "(?i)pc\\s*engine\\s*(super\\s*)?cd[-\\s]*rom"
    code: PCE-CD
  - pattern: "(?i)pc\\s*engine|turbo\\s*grafx|turbografx|tg-?16"
    code: PCE

  - pattern: "(?i)amiga\\s*cd32"
    code: ACD32
  - pattern: "(?i)amiga(\\s*\\d{3,4})?"
    code: AMIGA
  - pattern: "(?i)commodore\\s*64|\\bc64\\b"
    code: C64

  - pattern: "(?i)atari\\s*2600|\\bvcs\\b"
    code: A2600
  - pattern: "(?i)atari\\s*5200"
    code: A5200
  - pattern: "(?i)atari\\s*7800"
    code: A7800
  - pattern: "(?i)atari\\s*lynx|\\blynx\\b"
    code: LYNX
  - pattern: "(?i)atari\\s*jaguar\\s*cd"
    code: JAGCD
  - pattern: "(?i)atari\\s*jaguar"
    code: JAG
  - pattern: "(?i)atari\\s*st"
    code: AST

  - pattern: "(?i)neo\\s*geo\\s*mvs"
    code: NEO-MVS
  - pattern: "(?i)neo\\s*geo\\s*aes"
    code: NEO-AES
  - pattern: "(?i)neo\\s*geo\\s*cd"
    code: NGCD
  - pattern: "(?i)neo\\s*geo(?!\\s*(cd|pocket))"
    code: NEO-AES
  - pattern: "(?i)neo\\s*geo\\s*pocket\\s*color"
    code: NGPC
  - pattern: "(?i)neo\\s*geo\\s*pocket"
    code: NGP

  - pattern: "(?i)zx\\s*spectrum|\\bspectrum\\b"
    code: ZX
  - pattern: "(?i)amstrad\\s*cpc"
    code: CPC
  - pattern: "(?i)msx\\s*2\\+"
    code: MSX2+
  - pattern: "(?i)msx\\s*2"
    code: MSX2
  - pattern: "(?i)\\bmsx\\b"
    code: MSX

  - pattern: "(?i)pc-?98"
    code: PC98
  - pattern: "(?i)pc[-\\s]*8801|pc-?88"
    code: PC88
  - pattern: "(?i)x68000"
    code: X68K
  - pattern: "(?i)fm\\s*towns"
    code: FMT

  - pattern: "(?i)apple\\s*iigs"
    code: A2GS
  - pattern: "(?i)apple\\s*ii(?!gs)"
    code: A2
  - pattern: "(?i)mac\\b|mac\\s*os(\\s*x)?|macintosh"
    code: MAC

  - pattern: "(?i)ms-?dos|\\bibm\\s*pc\\b|\\bdos\\b"
    code: DOS
  - pattern: "(?i)windows|microsoft\\s*windows|\\bsteam\\b|\\bgog\\b"
    code: WIN

  - pattern: "(?i)3do"
    code: 3DO
  - pattern: "(?i)cd-?i|cd\\s*i"
    code: CDI
  - pattern: "(?i)vectrex"
    code: VEC
  - pattern: "(?i)intellivision"
    code: INTV
  - pattern: "(?i)coleco\\s*vision|colecovision"
    code: COLECO
  - pattern: "(?i)odyssey(2|²)"
    code: ODY2


